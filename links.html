<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="keywords" content="flajuss, links, linktree, social"><meta name="description" content="flajuss // links"><link rel="shortcut icon" href="favicon.ico" type="image/x-icon"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><title>flajuss // links</title><style>:root{--bg-color:#080809;--text-main:#eae8ff;--text-muted:#888888;--accent:#eae8ff;--font-main:'Outfit',sans-serif;--font-tech:'Space Mono',monospace;--glass-bg:rgba(234,232,255,0.03);--glass-border:1px solid rgba(234,232,255,0.06);--glass-blur:blur(24px) saturate(180%);--radius-lg:20px;--radius-md:12px}*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-user-drag:none}html{font-size:16px;-ms-overflow-style:none;scrollbar-width:none;background-color:var(--bg-color);width:100%}body{color:var(--text-main);font-family:var(--font-main);line-height:1.5;width:100%;background-color:var(--bg-color);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}::-webkit-scrollbar{display:none}::selection{background:transparent;color:inherit}#preloader{position:fixed;inset:0;background-color:var(--bg-color);z-index:999999;display:flex;justify-content:center;align-items:center;transition:opacity .4s ease}.preloader-text{font-family:var(--font-tech);color:var(--accent);font-size:.75rem;letter-spacing:2px}.liquid-glass{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,0.1)}.custom-context-menu{position:fixed;padding:6px 0;min-width:160px;z-index:1000000;visibility:hidden;opacity:0;transform:scale(0.95);transition:opacity .15s ease,transform .15s ease,visibility .15s;border-radius:var(--radius-md)}.custom-context-menu.show{visibility:visible;opacity:1;transform:scale(1)}.custom-context-menu a{display:block;padding:8px 20px;color:var(--text-muted);text-decoration:none;font-size:.8rem;transition:all .2s;text-transform:lowercase}.custom-context-menu a:hover{color:var(--accent);background:rgba(234,232,255,0.04);padding-left:24px}.menu-divider{height:1px;background:rgba(234,232,255,0.06);margin:4px 0}@media (pointer:fine) and (min-width:901px){body.cursor-active,body.cursor-active a,body.cursor-active button,body.cursor-active .snappy{cursor:none!important}.custom-cursor{position:fixed;top:0;left:0;pointer-events:none;z-index:9999999;display:none;justify-content:center;align-items:center;opacity:0;transition:opacity .2s ease,background .2s ease}.custom-cursor.active{display:flex}.custom-cursor::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border:1px solid var(--accent);background:transparent;border-radius:50%;transition:opacity .2s ease,transform .2s ease}.cursor-corner{position:absolute;width:4px;height:4px;border:1.5px solid var(--accent);opacity:0;transition:opacity .2s}.cursor-corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none}.cursor-corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none}.cursor-corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none}.cursor-corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none}.custom-cursor.cursor-snappy::before{opacity:0;transform:translate(-50%,-50%) scale(0.5)}.custom-cursor.cursor-snappy .cursor-corner{opacity:1}.custom-cursor.cursor-snappy{background:rgba(234,232,255,0.05);border-radius:8px}}.tree-container{width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center;z-index:10;animation:fadeInUp 1s ease forwards;opacity:0;transform:translateY(20px);margin:auto}@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}.profile-pic{width:110px;height:110px;border-radius:50%;overflow:hidden;margin-bottom:20px;border:2px solid rgba(234,232,255,0.1);transition:transform .4s cubic-bezier(0.175,0.885,0.32,1.275);-webkit-backface-visibility:hidden;backface-visibility:hidden}.profile-pic:hover{transform:scale(1.05);border-color:var(--accent)}.profile-pic img{width:100%;height:100%;object-fit:cover}.username{font-size:1.5rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:25px}.social-row{display:flex;gap:20px;margin-bottom:40px}.social-icon{color:var(--text-muted);transition:color .3s,transform .3s;display:flex;align-items:center;justify-content:center}.social-icon:hover{color:var(--accent);transform:translateY(-2px)}.social-icon svg{width:22px;height:22px;fill:currentColor}.links-wrapper{width:100%;display:flex;flex-direction:column;gap:16px}.link-btn{position:relative;width:100%;padding:18px 24px;border-radius:var(--radius-md);text-decoration:none;color:var(--text-main);display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(0.175,0.885,0.32,1.275),background .3s,border-color .3s;overflow:hidden;background:var(--glass-bg);border:var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,0.1)}.link-btn:hover{transform:scale(1.02);background:rgba(234,232,255,0.08);border-color:rgba(234,232,255,0.15);z-index:2}.link-icon{position:absolute;left:24px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}.link-icon img{width:100%;height:100%;border-radius:50%}.link-icon svg{width:24px;height:24px;fill:var(--text-main)}.link-text{font-weight:600;font-size:0.95rem;letter-spacing:0.5px}.link-dots{position:absolute;right:24px;color:var(--text-muted)}.tree-footer{margin-top:60px;display:flex;justify-content:center}.tree-footer a{color:#444;font-size:0.7rem;text-decoration:none;font-family:var(--font-tech);letter-spacing:1px;transition:color .3s}.tree-footer a:hover{color:var(--accent)}@media(max-width:600px){body{padding:40px 20px;justify-content:flex-start}.link-btn{padding:16px 20px}.link-icon{left:16px;width:28px;height:28px}.link-dots{right:16px}}</style></head><body><div id="preloader"><div class="preloader-text" id="preloader-text">INITIALIZING SYSTEM...</div></div><div id="custom-context-menu" class="custom-context-menu liquid-glass"></div><div id="custom-cursor" class="custom-cursor cursor-default"><div class="cursor-corner tl"></div><div class="cursor-corner tr"></div><div class="cursor-corner bl"></div><div class="cursor-corner br"></div></div><main class="tree-container"><div class="profile-pic snappy"><img src="prof.png" alt="flajuss profile"></div><h1 class="username matrix-text" data-value="flajuss">flajuss</h1><div id="social-row-container" class="social-row"></div><div id="links-wrapper-container" class="links-wrapper"></div><footer class="tree-footer"><a href="https://witrynaodzera.pl" target="_blank" class="snappy">© 2026 WITRYNAODZERA™</a></footer></main><script>document.addEventListener("DOMContentLoaded",()=>{const preloader=document.getElementById('preloader');const preloaderText=document.getElementById('preloader-text');const originalText="initializing links...";const matrixChars="abcdefghijklmnopqrstuvwxyz0123456789@#$%&*";let loaderInterval=setInterval(()=>{preloaderText.innerText=originalText.split('').map(c=>{if(c===' ')return ' ';return matrixChars[Math.floor(Math.random()*matrixChars.length)]}).join('')},50);fetch('https://raw.githubusercontent.com/antonizabicki/flajusslinks/refs/heads/main/links.json').then(response=>response.json()).then(data=>{const socialContainer=document.getElementById('social-row-container');(data.socials||[]).forEach(soc=>{socialContainer.insertAdjacentHTML('beforeend',`<a href="${soc.url}" class="social-icon snappy" target="_blank" title="${soc.name}"><svg viewBox="${soc.viewBox}"><path d="${soc.path}"/></svg></a>`)});const linksContainer=document.getElementById('links-wrapper-container');(data.links||[]).forEach(link=>{let iconHtml=link.viewBox&&link.path?`<div class="link-icon"><svg viewBox="${link.viewBox}"><path d="${link.path}"/></svg></div>`:'';linksContainer.insertAdjacentHTML('beforeend',`<a href="${link.url}" target="_blank" class="link-btn snappy">${iconHtml}<span class="link-text matrix-text" data-value="${link.name}">${link.name}</span><div class="link-dots">⋮</div></a>`)});const contextMenu=document.getElementById('custom-context-menu');(data.contextMenu||[]).forEach(item=>{if(item.type==='divider'){contextMenu.insertAdjacentHTML('beforeend','<div class="menu-divider"></div>')}else{contextMenu.insertAdjacentHTML('beforeend',`<a href="${item.url}" target="_blank" class="snappy">${item.name}</a>`)}});initMatrixEffects();initCursorEffects();finishPreloader()}).catch(error=>{console.error('Błąd podczas ładowania pliku JSON.',error);preloaderText.innerText='ERROR: LOAD JSON';setTimeout(()=>{document.getElementById('preloader').style.display='none'},2000)});function finishPreloader(){setTimeout(()=>{clearInterval(loaderInterval);preloaderText.innerText=originalText;setTimeout(()=>{preloader.style.opacity='0';setTimeout(()=>{preloader.style.display='none';const isDesktop=window.matchMedia("(pointer: fine)").matches&&window.innerWidth>900;if(isDesktop){const cursor=document.getElementById('custom-cursor');if(cursor){cursor.style.display='flex';document.body.classList.add('cursor-active');cursor.classList.add('active')}}},400)},400)},800)}const contextMenu=document.getElementById('custom-context-menu');document.addEventListener('contextmenu',e=>{e.preventDefault();const isDesktop=window.matchMedia("(pointer: fine)").matches&&window.innerWidth>900;if(!isDesktop)return;contextMenu.classList.add('show');let x=e.clientX;let y=e.clientY;if(x+contextMenu.offsetWidth>window.innerWidth){x=window.innerWidth-contextMenu.offsetWidth-10}if(y+contextMenu.offsetHeight>window.innerHeight){y=window.innerHeight-contextMenu.offsetHeight-10}contextMenu.style.left=`${x}px`;contextMenu.style.top=`${y}px`});document.addEventListener('click',e=>{if(e.button!==2){contextMenu.classList.remove('show')}});function initMatrixEffects(){document.querySelectorAll('.matrix-text').forEach(element=>{element.addEventListener('mouseenter',e=>{let iterations=0;const originalDatasetText=e.target.dataset.value;clearInterval(e.target.matrixInterval);e.target.matrixInterval=setInterval(()=>{e.target.innerText=originalDatasetText.split('').map((letter,index)=>{if(index<iterations)return originalDatasetText[index];if(originalDatasetText[index]===' ')return ' ';return matrixChars[Math.floor(Math.random()*matrixChars.length)]}).join('');if(iterations>=originalDatasetText.length){clearInterval(e.target.matrixInterval);e.target.innerText=originalDatasetText}iterations+=0.5},30)})})}function initCursorEffects(){const isDesktopCursor=window.matchMedia("(pointer: fine)").matches&&window.innerWidth>900;if(isDesktopCursor){const cursor=document.getElementById('custom-cursor');let mouseX=window.innerWidth/2;let mouseY=window.innerHeight/2;let cursorX=mouseX;let cursorY=mouseY;let isSnapped=false;let snappedElement=null;function animateCursor(){if(!isSnapped){cursorX+=(mouseX-cursorX)*0.2;cursorY+=(mouseY-cursorY)*0.2;if(cursor){cursor.style.transform=`translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;cursor.style.width='14px';cursor.style.height='14px'}}else if(snappedElement){const rect=snappedElement.getBoundingClientRect();const targetX=rect.left+rect.width/2;const targetY=rect.top+rect.height/2;cursorX+=(targetX-cursorX)*0.4;cursorY+=(targetY-cursorY)*0.4;if(cursor){cursor.style.transform=`translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;cursor.style.width=`${rect.width+10}px`;cursor.style.height=`${rect.height+10}px`}}requestAnimationFrame(animateCursor)}animateCursor();window.addEventListener('mousemove',(e)=>{if(cursor&&cursor.style.opacity!=="1")cursor.style.opacity="1";mouseX=e.clientX;mouseY=e.clientY});document.querySelectorAll('.snappy').forEach(el=>{el.addEventListener('mouseenter',()=>{isSnapped=true;snappedElement=el;if(cursor)cursor.className='custom-cursor active cursor-snappy'});el.addEventListener('mouseleave',()=>{isSnapped=false;snappedElement=null;if(cursor)cursor.className='custom-cursor active cursor-default'})})}}})</script></body></html>
